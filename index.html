  <!-- ===== Zoho 必要 JS（含 encoder）===== -->
  <script src="https://static.zohocdn.com/zohodeskstatic/app/js/jqueryandencoder.ef05974972bf3bca1b87.js"></script>

  <!-- ===== Zoho 表單驗證 + 附件 + Captcha（精簡但完整可用版）===== -->
  <script>
    // ---- 基本設定 ----
    var FORM_ID = "1276964000000470001";
    var FORM_NAME = "zsWebToCase_" + FORM_ID;
    var SUBMIT_ID = "zsSubmitButton_" + FORM_ID;

    var zsWebFormMandatoryFields = ["Contact Name","Email","Subject"];
    var zsFieldsDisplayLabelArray = ["姓","郵件","主題"];

    // ---- encoder（Zoho 原本用法）----
    var ZSEncoder = {
      encodeForHTML : function(str){ if(str && typeof(str)==='string'){ return jQuery.encoder.encodeForHTML(str);} return str; },
      encodeForHTMLAttribute : function(str){ if(str && typeof(str)==='string'){ return jQuery.encoder.encodeForHTMLAttribute(str);} return str; }
    };

    // ---- 附件控制 ----
    var zsAttachedAttachmentsCount = 0;
    var zsAttachmentFileBrowserIdsList = [1,2,3,4,5];

    function zsOpenFileBrowseAttachment(e){
      if(zsAttachedAttachmentsCount >= 5){ e.preventDefault(); }
    }

    function zsRearrangeFileBrowseAttachments(){
      jQuery.each(jQuery('input[type = file]'), function(fileIndex, fileObject){
        fileIndex = fileIndex + 1;
        if(fileIndex === zsAttachmentFileBrowserIdsList[0]) jQuery('#zsattachment_'+fileIndex).show();
        else jQuery('#zsattachment_'+fileIndex).hide();
      });
    }

    function zsChangeMousePointer(){
      if(zsAttachedAttachmentsCount >= 5){
        jQuery('#zsMaxLimitMessage').show();
        jQuery('#zsattachment_1,#zsattachment_2,#zsattachment_3,#zsattachment_4,#zsattachment_5').hide();
        jQuery('#zsBrowseAttachment').css('cursor', 'default');
      }else{
        jQuery('#zsMaxLimitMessage').hide();
        zsRearrangeFileBrowseAttachments();
        jQuery('#zsBrowseAttachment').css('cursor', 'pointer');
      }
    }

    function zsRenderBrowseFileAttachment(zsAttachmentObject, zsAttachmentDetails){
      if(zsAttachmentObject !== ''){
        // size limit 20MB
        if(zsAttachmentDetails.files && zsAttachmentDetails.files[0] && (zsAttachmentDetails.files[0].size/(1024*1024)) > 20){
          zsAttachmentDetails.value = '';
          alert('允許的檔大小上限為20MB。');
          return;
        }
        if(zsAttachedAttachmentsCount < 5){
          var zsFileName = '';
          if(zsAttachmentObject.indexOf('\\') > -1){
            var arr = zsAttachmentObject.split('\\');
            zsFileName = arr[arr.length - 1];
          }else{
            zsFileName = zsAttachmentObject;
          }

          // block unsupported ext
          var extension = zsFileName.split('.').pop().toLowerCase();
          var unSupportedExtensions = ["ade","adp","apk","appx","appxbundle","bat","cab","cer","chm","cmd","com","cpl","dll","dmg","exe","hlp","hta","ins","iso","isp","jar","js","jse","lnk","mde","msc","msi","msix","msixbundle","msp","mst","nsh","pif","ps1","pst","reg","scr","sct","shb","sys","tmp","url","vb","vbe","vbs","vxd","wsc","wsf","wsh","terminal"];
          if(unSupportedExtensions.indexOf(extension) !== -1){
            alert("該檔未附加，因為其副檔名不受支援。");
            zsAttachmentDetails.value = '';
            return;
          }

          var zsCurrentAttachmentId = parseInt(jQuery(zsAttachmentDetails).attr('id').split('_')[1], 10);
          var idx = jQuery.inArray(zsCurrentAttachmentId, zsAttachmentFileBrowserIdsList);
          if(idx !== -1) zsAttachmentFileBrowserIdsList.splice(idx, 1);

          var zsNextAttachmentId = zsAttachmentFileBrowserIdsList[0];
          jQuery('#zsattachment_'+zsCurrentAttachmentId).hide();
          jQuery('#zsattachment_'+zsNextAttachmentId).show();

          jQuery('#zsFileBrowseAttachments').append(
            '<div class="filenamecls zsFontClass" id="file_'+zsCurrentAttachmentId+'">'+
              ZSEncoder.encodeForHTML(zsFileName) +
              '<a class="zsfilebrowseAttachment" style="margin-left:10px;" href="javascript:;" id="fileclose_'+zsCurrentAttachmentId+'">X</a>'+
            '</div>'
          );
          zsAttachedAttachmentsCount++;
        }
      }
      zsChangeMousePointer();
    }

    jQuery(document).off('click.fba').on('click.fba', '.zsfilebrowseAttachment', function(){
      var currentlyDeleted = jQuery(this).attr('id').split('_')[1];
      jQuery('#zsattachment_'+currentlyDeleted).val('');
      jQuery('#zsattachment_'+currentlyDeleted).replaceWith(jQuery('#zsattachment_'+currentlyDeleted).clone());
      jQuery(this).parent().remove();

      zsAttachedAttachmentsCount--;
      zsAttachmentFileBrowserIdsList.push(parseInt(currentlyDeleted, 10));
      zsAttachmentFileBrowserIdsList.sort(function(a,b){return a-b;});

      zsRearrangeFileBrowseAttachments();
      zsChangeMousePointer();
    });

    // ---- Captcha ----
    function zsShowCaptcha(){
      jQuery('#zsCaptchaLoading').hide();
      jQuery('#zsCaptcha').show();
    }

    function zsRegenerateCaptcha(){
      var xhr = new XMLHttpRequest();
      xhr.open('GET','https://desk.zoho.com/support/GenerateCaptcha?action=getNewCaptcha&_=' + new Date().getTime(), true);
      xhr.onreadystatechange = function(){
        if(xhr.readyState === 4 && xhr.status === 200){
          try{
            var response = JSON.parse(xhr.responseText || '{}');
            jQuery('#zsCaptchaUrl').load(zsShowCaptcha);
            document.getElementById('zsCaptchaUrl').src = response.captchaUrl;
            document.getElementsByName('xJdfEaS')[0].value = response.captchaDigest;
          }catch(e){}
        }
      };
      xhr.send();
    }

    // ---- 驗證（最重要：最後要 return true）----
    function zsValidateMandatoryFields(){
      var form = document.forms[FORM_NAME];

      for(var i=0; i<zsWebFormMandatoryFields.length; i++){
        var fname = zsWebFormMandatoryFields[i];
        var field = form[fname];
        if(field){
          var val = (field.value || '').replace(/^\s+|\s+$/g,'');
          if(val.length === 0){
            alert(zsFieldsDisplayLabelArray[i] + ' 不能為空');
            field.focus();
            return false;
          }
          if(field.name === 'Email'){
            var emailOk = /^([\w_][\w\-_.+\'&]*)@(?=.{4,256}$)(([\w]+)([\-_]*[\w])*[\.])+[a-zA-Z]{2,22}$/.test(field.value);
            if(!emailOk){
              alert('輸入一個有效的郵箱Id');
              field.focus();
              return false;
            }
          }
        }
      }

      // captcha
      if((form['zsWebFormCaptchaWord'].value || '').replace(/^\s+|\s+$/g,'').length === 0){
        alert('請輸入驗證碼。');
        form['zsWebFormCaptchaWord'].focus();
        return false;
      }

      // disable submit to avoid double-click
      document.getElementById(SUBMIT_ID).setAttribute('disabled', 'disabled');

      return true; // ✅ 這行是完整性關鍵：避免 undefined 造成提交被阻擋
    }

    // ---- Reset ----
    function zsResetWebForm(webFormId){
      document.forms['zsWebToCase_'+webFormId].reset();
      document.getElementById('zsSubmitButton_'+webFormId).removeAttribute('disabled');

      zsAttachedAttachmentsCount = 0;
      zsAttachmentFileBrowserIdsList = [1,2,3,4,5];
      jQuery('#zsFileBrowseAttachments').html('');
      zsRearrangeFileBrowseAttachments();
      zsChangeMousePointer();
      if(window.zsRegenerateCaptcha) zsRegenerateCaptcha();
    }

    // ---- 初始化 ----
    window.addEventListener('pageshow', function(){
      var btn = document.getElementById(SUBMIT_ID);
      if(btn) btn.removeAttribute('disabled');

      var form = document.forms[FORM_NAME];
      if(form && form['zsWebFormCaptchaWord'] && form['zsWebFormCaptchaWord'].value){
        form['zsWebFormCaptchaWord'].value = '';
      }
      zsRegenerateCaptcha();
      zsChangeMousePointer();
    });

    document.addEventListener('readystatechange', function(){
      if(document.readyState === 'complete'){
        zsRegenerateCaptcha();
        zsChangeMousePointer();
      }
    });
  </script>
</head>

  <!-- ===== Product Info 動態新增/刪除 + Qty 數字限制 + Submit 彙整到 hidden Product_Details ===== -->
  <script>
  (function(){
    const form = document.getElementById('zsWebToCase_1276964000000470001');
    const prodRows = document.getElementById('prodRows');
    const addRowBtn = document.getElementById('addRow');
    const hidden = document.getElementById('Product_Details');

    // ✅ 這四個元素缺一不可（有 hidden 才能彙整送出）
    if(!form || !prodRows || !addRowBtn || !hidden) return;

    function digitsOnly(input){
      input.value = input.value.replace(/[^\d]/g, '');
    }

    function getTemplateItem(){
      return prodRows.querySelector('.prod-item');
    }

    // 新增一筆
    addRowBtn.addEventListener('click', () => {
      const tpl = getTemplateItem();
      if(!tpl) return;

      const clone = tpl.cloneNode(true);
      clone.querySelectorAll('input, select, textarea').forEach(el => el.value = '');
      prodRows.appendChild(clone);
    });

    // 刪除一筆（至少保留一筆）
    prodRows.addEventListener('click', (e) => {
      const btn = e.target.closest('.removeRow');
      if(!btn) return;

      const items = prodRows.querySelectorAll('.prod-item');
      if(items.length <= 1) return;

      const item = btn.closest('.prod-item');
      if(item) item.remove();
    });

    // Qty 限制為數字
    prodRows.addEventListener('input', (e) => {
      if(e.target.classList.contains('p-qty')) digitsOnly(e.target);
    });

    // ✅ Submit 前彙整（會在 onsubmit 驗證前也完成 DOM 寫入）
    form.addEventListener('submit', () => {
      const items = [...prodRows.querySelectorAll('.prod-item')];

      const lines = items.map((item, idx) => {
        const r = item.querySelector('.prod-row');
        const model = r.querySelector('.p-model')?.value.trim() || '';
        const sn    = r.querySelector('.p-sn')?.value.trim() || '';
        const qty   = r.querySelector('.p-qty')?.value.trim() || '';
        const fc    = r.querySelector('.p-fc')?.value.trim() || '';

        if(!model && !sn && !qty && !fc) return null;

        return [
          `#${idx+1}`,
          model ? `Model=${model}` : null,
          sn    ? `SN=${sn}` : null,
          qty   ? `Qty=${qty}` : null,
          fc    ? `FailureCode=${fc}` : null
        ].filter(Boolean).join(' ; ');
      }).filter(Boolean);

      hidden.value = lines.join('\n');
    }, true); // capture=true，確保最早寫入
  })();
  </script>
