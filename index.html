  <script src="https://static.zohocdn.com/zohodeskstatic/app/js/jqueryandencoder.ef05974972bf3bca1b87.js"></script>

  <!-- ===== Zoho 官方 JS（保留新公司 Form ID：1276964000000470001）===== -->
  <script>
    window.addEventListener('pageshow', function () {
      const submitButton = document.getElementById('zsSubmitButton_1276964000000470001');
      if (submitButton) submitButton.removeAttribute('disabled');

      const captchaTextField = document.forms['zsWebToCase_1276964000000470001']['zsWebFormCaptchaWord'];
      if(window.zsRegenerateCaptcha && captchaTextField.value) {
        captchaTextField.value = '';
        captchaTextField.focus();
        zsRegenerateCaptcha();
      }
    });

    function trimBoth(str){return jQuery.trim(str);}

    function setAllDependancyFieldsMapping(){
      var mapDependancyLabels = getMapDependenySelectValues(jQuery("[id='property(module)']").val(), "JSON_MAP_DEP_LABELS");
      if(mapDependancyLabels){
        for(var i = 0; i < mapDependancyLabels.length; i++){
          var label = mapDependancyLabels[i];
          var obj = document.forms['zsWebToCase_1276964000000470001'][label];
          if(obj){setDependent(obj, true);}
        }
      }
    }

    function getMapDependenySelectValues(module, key){
      var dependencyObj = jQuery.parseJSON( jQuery("[id='dependent_field_values_" + module + "']").val() );
      if(dependencyObj == undefined){return dependencyObj;}
      return dependencyObj[key];
    }

    function setDependent(obj, isload){
      var name = obj.id || (obj[0] && obj[0].id) || "";
      var module = jQuery("[id='property(module)']").val();
      var val = "";
      var myObject = getMapDependenySelectValues(module, "JSON_VALUES");
      if(myObject !=undefined){val = myObject[name];}
      var mySelObject = getMapDependenySelectValues(module, "JSON_SELECT_VALUES");
      if(val != null && val != "" && val != "null" && mySelObject){
        var fields = val;
        for(var i in fields){
          if (fields.hasOwnProperty(i)){
            var isDependent = false;
            var label = i;
            var values = fields[i];
            if(label.indexOf(")") > -1){label = label.replace(/\)/g, '_____');}
            if(label.indexOf("(") > -1){label = label.replace(/\(/g, '____');}
            if(label.indexOf(".") > -1){label = label.replace(/\./g, '___');}
            var depObj = document.forms['zsWebToCase_1276964000000470001'][label];
            if(depObj && depObj.options){
              var mapValues = "";
              var selected_val = depObj.value;
              var depLen = depObj.options.length-1;
              for (var n = depLen; n >= 0; n--) {
                if (depObj.options[n].selected){
                  if(mapValues == ""){mapValues = depObj.options[n].value;}
                  else{mapValues = mapValues + ";;;"+depObj.options[n].value;}
                }
              }
              depObj.value = "";
              var selectValues = mySelObject[label];
              for(var k in values){
                var rat = k;
                if(rat == "-None-"){rat = "";}
                if(rat == trimBoth(obj.value)){
                  isDependent = true;
                  depObj.length = 0;
                  var depvalues = values[k];
                  var depLen2 = depvalues.length - 1;
                  for(var j = 0; j <= depLen2; j++){
                    var optionElement = document.createElement("OPTION");
                    var displayValue = depvalues[j];
                    var actualValue = displayValue;
                    if(actualValue == "-None-"){optionElement.value = "";displayValue = "-None-";}
                    else{optionElement.value = actualValue;}
                    optionElement.text = displayValue;
                    if(mapValues != undefined){
                      var mapValue = mapValues.split(";;;");
                      for(var p = 0; p < mapValue.length; p++){
                        if(actualValue == mapValue[p]){optionElement.selected = true;}
                      }
                    }
                    depObj.options.add(optionElement);
                  }
                }
              }
              if(!isDependent){
                depObj.length = 0;
                for(var j2 = 0; j2 < selectValues.length; j2++){
                  var actualValue2 = selectValues[j2];
                  var optionElement2 = document.createElement("OPTION");
                  if(actualValue2 == "-None-"){optionElement2.value = "";}
                  else{optionElement2.value = selectValues[j2];}
                  optionElement2.text = selectValues[j2];
                  depObj.options.add(optionElement2);
                }
                depObj.value = selected_val;
              }
              if(!isload){setDependent(depObj,false);}
              var jdepObj = jQuery(depObj);
              if(jdepObj.hasClass('select2-offscreen')){jdepObj.select2("val", jdepObj.val());}
            }
          }
        }
      }
    }

    var zctt = function(){
      var tt, mw = 400, top = 10, left = 0, doctt = document;
      var ieb = doctt.all ? true : false;
      return{
        showtt: function(cont, wid){
          if(tt == null){
            tt = doctt.createElement('div');
            tt.setAttribute('id', 'tooltip-zc');
            doctt.body.appendChild(tt);
            doctt.onmousemove = this.setpos;
            doctt.onclick = this.hidett;
          }
          tt.style.display = 'block';
          tt.innerHTML = cont;
          tt.style.width = wid ? wid + 'px' : 'auto';
          if(!wid && ieb){tt.style.width = tt.offsetWidth;}
          if(tt.offsetWidth > mw){tt.style.width = mw + 'px'}
          h = parseInt(tt.offsetHeight) + top;
          w = parseInt(tt.offsetWidth) + left;
        },
        hidett: function(){tt.style.display = 'none';},
        setpos: function(e){
          var u = ieb ? event.clientY + doctt.body.scrollTop : e.pageY;
          var l = ieb ? event.clientX + doctt.body.scrollLeft : e.pageX;
          var cw = doctt.body.clientWidth;
          var ch = doctt.body.clientHeight;
          if(l < 0){tt.style.left = left + 'px';tt.style.right = '';}
          else if((l+w+left) > cw){tt.style.left = '';tt.style.right = ((cw-l) + left) + 'px';}
          else{tt.style.right = '';tt.style.left = (l + left) + 'px';}
          if(u < 0){tt.style.top = top + 'px';tt.style.bottom = '';}
          else if((u + h + left) > ch){tt.style.top = '';tt.style.bottom = ((ch - u) + top) + 'px';}
          else{tt.style.bottom = '';tt.style.top = (u + top) + 'px';}
        }
      };
    }();

    var zsWebFormMandatoryFields = new Array("Contact Name","Email","Subject");
    var zsFieldsDisplayLabelArray = new Array("姓","郵件","主題");

    function reformatAllDateFields() {
      const dateFields = document.querySelectorAll('.dob-field');
      dateFields.forEach(field => {
        if (field.value && field.value.includes('-')) {
          const parts = field.value.split('-');
          if (parts.length === 3) {
            const [yyyy, mm, dd] = parts;
            field.type= 'text';
            field.value = `${dd}/${mm}/${yyyy}`;
          }
        }
      });
    }

    function zsValidateMandatoryFields(){
      var isError = 0;

      for(var index = 0; index < zsWebFormMandatoryFields.length; index++){
        isError = 0;
        var fieldObject = document.forms['zsWebToCase_1276964000000470001'][zsWebFormMandatoryFields[index]];
        if(fieldObject){
          if(((fieldObject.value).replace(/^\s+|\s+$/g, '')).length == 0){
            alert(zsFieldsDisplayLabelArray[index] +' 不能為空 ');
            fieldObject.focus();
            isError = 1;
            return false;
          }else{
            if(fieldObject.name == 'Email'){
              if(!fieldObject.value.match(/^([\w_][\w\-_.+\'&]*)@(?=.{4,256}$)(([\w]+)([\-_]*[\w])*[\.])+[a-zA-Z]{2,22}$/)){
                isError = 1;
                alert('輸入一個有效的郵箱Id');
                fieldObject.focus();
                return false;
              }
            }
          }
          if(fieldObject.nodeName == 'SELECT'){
            if(fieldObject.options[fieldObject.selectedIndex].value == '-None-'){
              alert(zsFieldsDisplayLabelArray[index] +' 不能為空');
              fieldObject.focus();
              isError = 1;
              return false;
            }
          }
          if(fieldObject.type == 'checkbox'){
            if (fieldObject.checked == false){
              alert('請接受 '+zsFieldsDisplayLabelArray[index]);
              fieldObject.focus();
              isError = 1;
              return false;
            }
          }
        }
      }

      if(document.forms['zsWebToCase_1276964000000470001']['zsWebFormCaptchaWord'].value.replace(/^\s+|\s+$/g, '').length == 0){
        alert('請輸入驗證碼。');
        document.forms['zsWebToCase_1276964000000470001']['zsWebFormCaptchaWord'].focus();
        return false;
      }

      reformatAllDateFields();
      document.getElementById('zsSubmitButton_1276964000000470001').setAttribute('disabled', 'disabled');

      return true; // ✅ 重要：避免 undefined 導致 submit 被阻擋
    }

    var ZSEncoder = {
      encodeForHTML : function(str){if(str && typeof(str)==='string'){return jQuery.encoder.encodeForHTML(str);}return str;},
      encodeForHTMLAttribute : function(str) {if(str && typeof(str)==='string'){return jQuery.encoder.encodeForHTMLAttribute(str);}return str;},
      encodeForJavascript : function(str) {if(str && typeof(str)==='string'){return jQuery.encoder.encodeForJavascript(str);}return str;},
      encodeForCSS : function(str) {if(str && typeof(str)==='string'){return jQuery.encoder.encodeForCSS(str);}return str;}
    };

    var zsAttachedAttachmentsCount = 0;
    var zsAllowedAttachmentLimit = 4;
    var zsAttachmentFileBrowserIdsList = [1, 2, 3, 4, 5];

    function zsRenderBrowseFileAttachment(zsAttachmentObject, zsAttachmentDetails){
      if(zsAttachmentObject != ''){
        if((zsAttachmentDetails.files && (zsAttachmentDetails.files[0].size/(1024*1024))>20)){
          zsAttachmentDetails.value='';
          alert('允許的檔大小上限為20MB。');
          return;
        }
        if(zsAttachedAttachmentsCount < 5){
          var zsFileName='';
          if((zsAttachmentObject.indexOf('\\') > -1)){
            var arr = zsAttachmentObject.split('\\');
            zsFileName = arr[arr.length - 1];
          }else zsFileName = zsAttachmentObject;

          var extension = zsFileName.split('.').pop().toLowerCase();
          var unSupportedExtensions = ["ade","adp","apk","appx","appxbundle","bat","cab","cer","chm","cmd","com","cpl","dll","dmg","exe","hlp","hta","ins","iso","isp","jar","js","jse","lnk","mde","msc","msi","msix","msixbundle","msp","mst","nsh","pif","ps1","pst","reg","scr","sct","shb","sys","tmp","url","vb","vbe","vbs","vxd","wsc","wsf","wsh","terminal"];
          if(unSupportedExtensions.indexOf(extension)!=-1){
            alert("該檔未附加，因為其副檔名不受支援。");
            return;
          }
          var zsCurrentAttachmentIdTokens = jQuery(zsAttachmentDetails).attr('id').split('_');
          var zsCurrentAttachmentId = parseInt(zsCurrentAttachmentIdTokens[1]);
          var zsAttachmentIdToBeRemoved = jQuery.inArray(zsCurrentAttachmentId, zsAttachmentFileBrowserIdsList);
          zsAttachmentFileBrowserIdsList.splice(zsAttachmentIdToBeRemoved, 1);
          var zsNextAttachmentId = zsAttachmentFileBrowserIdsList[0];
          var zsnextAttachment = 'zsattachment_'+zsNextAttachmentId;

          jQuery('#zsattachment_'+zsCurrentAttachmentId).hide();
          jQuery('#'+zsnextAttachment).show();

          jQuery('#zsFileBrowseAttachments').append(
            '<div class="filenamecls zsFontClass" id="file_'+zsCurrentAttachmentId+'">'+
              ZSEncoder.encodeForHTML(zsFileName) +
              '<a class="zsfilebrowseAttachment" style="margin-left:10px;" href="javascript:;" id="fileclose_'+zsCurrentAttachmentId+'">X</a>'+
            '</div>'
          );
          zsAttachedAttachmentsCount = zsAttachedAttachmentsCount + 1;
        }
      }
      zsChangeMousePointer();
    }

    jQuery(document).off('click.fba').on('click.fba', '.zsfilebrowseAttachment', function(){
      var currentlyDeletedElement = jQuery(this).attr('id').split('_')[1];
      jQuery('#zsattachment_'+currentlyDeletedElement).val('');
      jQuery('#zsattachment_'+currentlyDeletedElement).replaceWith(jQuery('#zsattachment_'+currentlyDeletedElement).clone());
      jQuery(this).parent().remove();
      zsAttachedAttachmentsCount = zsAttachedAttachmentsCount - 1;
      zsAttachmentFileBrowserIdsList.push(parseInt(currentlyDeletedElement));
      zsRearrangeFileBrowseAttachments();
      zsChangeMousePointer();
    });

    function zsRearrangeFileBrowseAttachments(){
      jQuery.each(jQuery('input[type = file]'), function(fileIndex, fileObject){
        fileIndex = fileIndex + 1;
        if(fileIndex == zsAttachmentFileBrowserIdsList[0]) jQuery('#zsattachment_'+fileIndex).show();
        else jQuery('#zsattachment_'+fileIndex).hide();
      });
    }

    function zsOpenFileBrowseAttachment(clickEvent){
      if(zsAttachedAttachmentsCount >= 5){ clickEvent.preventDefault(); }
    }

    function zsChangeMousePointer(){
      if(zsAttachedAttachmentsCount >= 5){
        jQuery('#zsMaxLimitMessage').show();
        jQuery('#zsattachment_1,#zsattachment_2,#zsattachment_3,#zsattachment_4,#zsattachment_5').hide();
        jQuery('#zsBrowseAttachment,#zsCloudAttachment').css('cursor', 'default');
      }else{
        jQuery('#zsMaxLimitMessage').hide();
        zsRearrangeFileBrowseAttachments();
        jQuery('#zsBrowseAttachment,#zsCloudAttachment').css('cursor', 'pointer');
      }
    }

    function zsShowCaptcha(){jQuery('#zsCaptchaLoading').hide();jQuery('#zsCaptcha').show();}

    function zsRegenerateCaptcha(){
      var webFormxhr = new XMLHttpRequest();
      webFormxhr.open('GET','https://desk.zoho.com/support/GenerateCaptcha?action=getNewCaptcha&_='+new Date().getTime(),true);
      webFormxhr.onreadystatechange = function () {
        if(webFormxhr.readyState === 4 && webFormxhr.status === 200) {
          try{
            var response = (webFormxhr.responseText != null) ? JSON.parse(webFormxhr.responseText) : '';
            jQuery('#zsCaptchaUrl').load(zsShowCaptcha);
            document.getElementById('zsCaptchaUrl').src = response.captchaUrl;
            document.getElementsByName('xJdfEaS')[0].value = response.captchaDigest;
          }catch(e){}
        }
      };
      webFormxhr.send();
    }

    document.addEventListener('readystatechange',function(){
      if(document.readyState === 'complete' && window.zsRegenerateCaptcha ){ zsRegenerateCaptcha(); }
      setAllDependancyFieldsMapping();
      document.getElementById('zsSubmitButton_1276964000000470001').removeAttribute('disabled');
      zsAttachedAttachmentsCount = 0;
      zsAttachmentFileBrowserIdsList = [1, 2, 3, 4, 5];
      document.forms['zsWebToCase_1276964000000470001']['zsWebFormCaptchaWord'].value = '';
      jQuery('#zsFileBrowseAttachments').html('');
      zsRearrangeFileBrowseAttachments();
      zsChangeMousePointer();
    });

    function zsResetWebForm(webFormId){
      document.forms['zsWebToCase_'+webFormId].reset();
      document.getElementById('zsSubmitButton_'+webFormId).removeAttribute('disabled');
      setAllDependancyFieldsMapping();
      zsAttachedAttachmentsCount = 0;
      zsAttachmentFileBrowserIdsList = [1, 2, 3, 4, 5];
      jQuery('#zsFileBrowseAttachments').html('');
      zsRearrangeFileBrowseAttachments();
      zsChangeMousePointer();
    }
  </script>
</head>

<body>
  <div id="zohoSupportWebToCase" align="center">
    <form name="zsWebToCase_1276964000000470001"
          id="zsWebToCase_1276964000000470001"
          action="https://desk.zoho.com/support/WebToCase"
          method="POST"
          onsubmit="return zsValidateMandatoryFields()"
          enctype="multipart/form-data">

      <!-- ✅ 新公司 Token / returnURL：保留 -->
      <input type="hidden" name="xnQsjsdp" value="edbsn8d9cdbf85950ae6192d0cb8377aae594"/>
      <input type="hidden" name="xmIwtLD" value="edbsnf9ba4bd44e524af7500641fb0dc03f8dab09dcba0ddd2f5a12eb77f67ed9946d"/>
      <input type="hidden" name="xJdfEaS" value=""/>
      <input type="hidden" name="actionType" value="Q2FzZXM="/>
      <input type="hidden" id="property(module)" value="Cases"/>
      <input type="hidden" id="dependent_field_values_Cases" value="{&quot;JSON_VALUES&quot;:{},&quot;JSON_SELECT_VALUES&quot;:{},&quot;JSON_MAP_DEP_LABELS&quot;:[]}"/>
      <input type="hidden" name="returnURL" value="https://www.google.com"/>

      <!-- ✅ 可視表單開始（避免只剩 hidden inputs 造成空白） -->
      <table border="0" cellspacing="0" class="zsFormClass">
        <tr>
          <td colspan="2" class="zsFontClass"><strong>RMA Repair Request</strong></td>
        </tr>

        <!-- Subject -->
        <tr>
          <td width="25%" align="left" class="zsFontClass">
            <label>Subject <span class="wtcmanfield">*</span></label>
          </td>
          <td width="75%" align="left">
            <input type="text" maxlength="255" name="Subject" value="" class="manfieldbdr"/>
          </td>
        </tr>

        <!-- Customer + Contact -->
        <tr>
          <td width="25%" align="left" class="zsFontClass">
            <label>Customer / Contact Name <span class="wtcmanfield">*</span></label>
          </td>
          <td width="75%" align="left">
            <div class="row-flex">
              <div class="col">
                <label>Customer Name</label>
                <input type="text" maxlength="120" name="Customer Name" value=""/>
              </div>
              <div class="col">
                <label>Contact Name</label>
                <input type="text" maxlength="120" name="Contact Name" class="manfieldbdr"/>
              </div>
            </div>
          </td>
        </tr>

        <!-- Email + Address -->
        <tr>
          <td width="25%" align="left" class="zsFontClass">
            <label>Email / Address <span class="wtcmanfield">*</span></label>
          </td>
          <td width="75%" align="left">
            <div class="row-flex">
              <div class="col">
                <label>Email</label>
                <input type="text" maxlength="120" name="Email" value="" class="manfieldbdr"/>
              </div>
              <div class="col">
                <label>Address</label>
                <input type="text" maxlength="120" name="Address" value=""/>
              </div>
            </div>
          </td>
        </tr>

        <!-- 分隔線 -->
        <tr class="section-divider">
          <td colspan="2"><div class="hr-line"></div></td>
        </tr>

        <!-- Product Info（動態多筆） -->
        <tr>
          <td width="25%" align="left" class="zsFontClass">
            <label>Product Info</label>
          </td>
          <td width="75%" align="left">
            <div class="prod-toolbar">
              <button type="button" id="addRow" class="btn btn-primary btn-sm">+ 新增一筆產品</button>
            </div>

            <div id="prodRows">
              <div class="prod-item">
                <div class="prod-row">
                  <div class="prod-del">
                    <button type="button" class="icon-btn removeRow" title="刪除">✕</button>
                  </div>
                  <div class="prod-field">
                    <label>Model</label>
                    <input type="text" class="p-model" maxlength="120"/>
                  </div>
                  <div class="prod-field">
                    <label>SN</label>
                    <input type="text" class="p-sn" maxlength="120"/>
                  </div>
                  <div class="prod-field">
                    <label>Qty</label>
                    <input type="text" class="p-qty" inputmode="numeric" pattern="[0-9]*" maxlength="10"/>
                  </div>
                  <div class="prod-field">
                    <label>FailureCode</label>
                    <input type="text" class="p-fc" maxlength="120"/>
                  </div>
                </div>
              </div>
            </div>

            <!-- ✅ 彙整後送出（多行文字） -->
            <textarea name="Product_Details" id="Product_Details" style="display:none;"></textarea>
          </td>
        </tr>

        <!-- Remark -->
        <tr>
          <td width="25%" align="left" class="zsFontClass">
            <label>Remark</label>
          </td>
          <td width="75%" align="left">
            <textarea name="Remark" maxlength="3000"></textarea>
          </td>
        </tr>

        <!-- 附件 -->
        <tr>
          <td width="25%" align="left" class="zsFontClass">
            <label>附件</label>
          </td>
          <td width="75%" align="left">
            <span class="zsFontClass wtcuploadfile" id="zsBrowseAttachment">附加檔</span>

            <input class="wtcuploadinput" type="file" name="attachment_1" id="zsattachment_1"
              style="display:block;" onclick="zsOpenFileBrowseAttachment(event)"
              onchange="zsRenderBrowseFileAttachment(this.value, this)"/>

            <input class="wtcuploadinput" type="file" name="attachment_2" id="zsattachment_2"
              style="display:none;" onclick="zsOpenFileBrowseAttachment(event)"
              onchange="zsRenderBrowseFileAttachment(this.value, this)"/>

            <input class="wtcuploadinput" type="file" name="attachment_3" id="zsattachment_3"
              style="display:none;" onclick="zsOpenFileBrowseAttachment(event)"
              onchange="zsRenderBrowseFileAttachment(this.value, this)"/>

            <input class="wtcuploadinput" type="file" name="attachment_4" id="zsattachment_4"
              style="display:none;" onclick="zsOpenFileBrowseAttachment(event)"
              onchange="zsRenderBrowseFileAttachment(this.value, this)"/>

            <input class="wtcuploadinput" type="file" name="attachment_5" id="zsattachment_5"
              style="display:none;" onclick="zsOpenFileBrowseAttachment(event)"
              onchange="zsRenderBrowseFileAttachment(this.value, this)"/>

            <div class="clboth"></div>
            <span id="zsMaxSizeMessage" style="color:black;font-size: 8px;float: left;">
              您每個檔的大小可高達20MB。
            </span>
            <span id="zsMaxLimitMessage" style="color:black;font-size: 8px;float: left;margin-left: 14px;display: none;">
              您可以一次性地附加多達5 個檔。
            </span>
            <div id="zsFileBrowseAttachments"></div>
          </td>
        </tr>

        <!-- 驗證碼 -->
        <tr>
          <td nowrap class="zsFontClass" width="25%" align="left">驗證碼&nbsp;</td>
          <td>
            <div id="zsCaptchaLoading"><strong>載入中...<br><br></strong></div>
            <div id="zsCaptcha" style="display:none;">
              <img src="#" id="zsCaptchaUrl" name="zsCaptchaImage">
              <a href="javascript:;" style="color:#00a3fe; cursor:pointer; margin-left:10px; vertical-align:middle;text-decoration:none;"
                 class="zsFontClass" onclick="zsRegenerateCaptcha()">刷新</a>
            </div>
            <div>
              <input type="text" name="zsWebFormCaptchaWord"/>
              <input type="hidden" name="zsCaptchaSrc" value=""/>
            </div>
          </td>
        </tr>

        <!-- 提交/重置 -->
        <tr>
          <td style="padding: 11px 5px 0px 5px;" colspan="2" align="center">
            <input type="submit" id="zsSubmitButton_1276964000000470001" class="zsFontClass" value="提交111">
            &nbsp;&nbsp;
            <input type="button" class="zsFontClass" value="重置" onclick="zsResetWebForm('1276964000000470001')">
          </td>
        </tr>

        <!-- Footer -->
        <tr>
          <td width="25%" align="left"></td>
          <td style="padding: 0px 5px;" align="left" width="75%">
            <div class="wb_FtCon wb_common">
              <span>技術支援方： </span>
              <a target="_blank" rel="noopener noreferrer" href="https://zoho.com/desk" class="wb_logoCon">
                <img class="wb_logo" src="https://static.zohocdn.com/zohtTemplateItem(){ return prodRows.querySelector('.prod-item'); }

      addRowBtn.addEventListener('click', () => {
        const tpl = getTemplateItem();
        if(!tpl) return;

        const clone = tpl.cloneNode(true);
        clone.querySelectorAll('input').forEach(i => i.value = '');
        prodRows.appendChild(clone);
      });

      prodRows.addEventListener('click', (e) => {
        const btn = e.target.closest('.removeRow');
        if(!btn) return;

        const items = prodRows.querySelectorAll('.prod-item');
        if(items.length <= 1) return; // 至少保留一筆

        const item = e.target.closest('.prod-item');
        if(item) item.remove();
      });

      prodRows.addEventListener('input', (e) => {
        if(e.target.classList.contains('p-qty')) digitsOnly(e.target);
      });

      form.addEventListener('submit', () => {
        const items = [...prodRows.querySelectorAll('.prod-item')];

        const lines = items.map((item, idx) => {
          const r = item.querySelector('.prod-row');
          const model = r.querySelector('.p-model')?.value.trim() || '';
          const sn    = r.querySelector('.p-sn')?.value.trim() || '';
          const qty   = r.querySelector('.p-qty')?.value.trim() || '';
          const fc    = r.querySelector('.p-fc')?.value.trim() || '';

          if(!model && !sn && !qty && !fc) return null;

          return [
            `#${idx+1}`,
            model ? `Model=${model}` : null,
            sn    ? `SN=${sn}` : null,
            qty   ? `Qty=${qty}` : null,
            fc    ? `FailureCode=${fc}` : null
          ].filter(Boolean).join(' ; ');
        }).filter(Boolean);

        hidden.value = lines.join('\n');
      });
    })();
  </script>
</body>
</html>
